# ============================================
# TMUX Configuration - Minimal Aesthetic
# ============================================

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-position bottom

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Navigation
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
#bind h select-pane -L
#bind j select-pane -D
#bind k select-pane -U
#bind l select-pane -R

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Ctrl+Space then h/j/k/l to create new panes
# (Comentado porque intercepta el prefix C-Space e impide usar atajos normales como " o %)
# bind-key -T root C-Space switch-client -T split_panes_table

# bind-key -T split_panes_table h split-window -h -b -c "#{pane_current_path}"
# bind-key -T split_panes_table l split-window -h -c "#{pane_current_path}"
# bind-key -T split_panes_table k split-window -v -b -c "#{pane_current_path}"
# bind-key -T split_panes_table j split-window -v -c "#{pane_current_path}"

# After splitting, return to the root table
# bind-key -T split_panes_table h send-keys C-Space
# bind-key -T split_panes_table l send-keys C-Space
# bind-key -T split_panes_table k send-keys C-Space
# bind-key -T split_panes_table j send-keys C-Space

# Restaurar atajos por defecto para dividir ventanas además de | y -
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"


# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Switch sessions with Shift + Up/Down
bind-key -n S-Up switch-client -p
bind-key -n S-Down switch-client -n

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window


# Sessions (sin prefijo)
bind -n C-M-[ switch-client -p
bind -n C-M-] switch-client -n
bind -n C-M-s choose-tree -Zs
bind -n C-M-t switch-client -l
bind -n M-N new-session

# ============================================
# Primary Theme: Unified Terminal UI (Rosé Pine Colorful)
# ============================================
# Background: #16161E (Night) | Palette: Rosé Pine
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#16161E,fg=#e0def4"
set -g status-left-length 100
set -g status-right-length 100
set -g status-interval 2

# Fix: Disable extra border/status lines
set -g pane-border-status off

# Search Style (Mode Style)
setw -g mode-style "bg=#{?#{==:#S,work},#31748f,#ebbcba},fg=#{?#{==:#S,work},#e0def4,#191724}"
set -g message-style "bg=#16161E,fg=#{?#{==:#S,work},#31748f,#eb6f92}"

# Left Side: Session & Parallelogram
set -g status-left "#[bg=#{?#{==:#S,work},#1e3a8a,#f6c177},fg=#{?#{==:#S,work},#e0def4,#191724},bold] #S #[bg=#16161E,fg=#{?#{==:#S,work},#1e3a8a,#f6c177}] "

# Window List
setw -g window-status-separator ""
setw -g window-status-current-format "#[fg=#16161E,bg=#{?#{==:#S,work},#31748f,#c4a7e7}]#[bg=#{?#{==:#S,work},#31748f,#c4a7e7},fg=#{?#{==:#S,work},#e0def4,#191724},bold] #I: #W #[fg=#{?#{==:#S,work},#31748f,#c4a7e7},bg=#16161E]"
setw -g window-status-format "#[fg=#{?#{==:#S,work},#56949f,#908caa},bg=#16161E] #I: #W #[fg=#16161E,bg=#16161E]"

# Right Side: Prefix Indicator & Current Directory
set -g status-right "#{?client_prefix,#[bg=#{?#{==:#S,work},#1e3a8a,#eb6f92}]#[fg=#{?#{==:#S,work},#e0def4,#191724}] PREFIX ,#[fg=#{?#{==:#S,work},#2a4b7c,#9ccfd8}]#[bg=#{?#{==:#S,work},#2a4b7c,#9ccfd8}]#[fg=#{?#{==:#S,work},#e0def4,#191724}] #{b:pane_current_path} }"

